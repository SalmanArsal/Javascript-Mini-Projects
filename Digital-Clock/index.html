<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Digital clock</h1>
    <h1 id="clock"></h1>

    <script>
        setInterval(_ =>{
            document.getElementById("clock")
        .innerText = new Date().toLocaleTimeString()
        })
    </script>
</body>
</html>
